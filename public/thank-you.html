<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Complete | Prana Yoga</title>
  <link rel="icon" href="/assets/logo.jpg">
  <link rel="apple-touch-icon" href="/assets/logo.jpg">
  <style>
    :root {
      --background: oklch(0.97 0.01 80);
      --foreground: oklch(0.25 0.03 30);
      --card: oklch(1 0 0);
      --primary: oklch(0.45 0.08 30);
      --accent: oklch(0.65 0.12 145);
      --muted-foreground: oklch(0.45 0.02 30);
      --border: oklch(0.88 0.02 80);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--card);
      border-radius: 40px;
      padding: 64px 48px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.03);
      border: 1px solid var(--border);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .card {
      animation: float 6s ease-in-out infinite;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 48px;
    }

    .logo-circle {
      width: 44px;
      height: 44px;
      background: oklch(0.45 0.08 30 / 0.08);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      mix-blend-mode: multiply;
    }

    .logo-text {
      font-family: serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--foreground);
      letter-spacing: -0.01em;
    }

    .icon-success {
      width: 88px;
      height: 88px;
      background: var(--primary);
      border-radius: 50%;
      margin: 0 auto 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 44px;
      box-shadow: 0 12px 24px -6px oklch(0.45 0.08 30 / 0.3);
      animation: popIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-family: serif;
      font-size: 2.75rem;
      font-weight: 700;
      color: var(--foreground);
      margin-bottom: 18px;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    p {
      font-size: 1.125rem;
      color: var(--muted-foreground);
      line-height: 1.6;
    }

    .highlight {
      color: var(--primary);
      font-weight: 600;
    }

    .status {
      margin-top: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 1rem;
      color: var(--muted-foreground);
      font-weight: 500;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0.3;
      animation: pulse 1.5s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    .bg-decoration {
      position: absolute;
      width: 400px;
      height: 400px;
      background: var(--primary);
      filter: blur(120px);
      opacity: 0.04;
      z-index: -1;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="bg-decoration" style="top: -200px; right: -200px;"></div>
  <div class="bg-decoration" style="bottom: -200px; left: -200px;"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-circle">
        <img src="/assets/logo.jpg" alt="Prana Yoga Logo">
      </div>
      <span class="logo-text">Prana Yoga</span>
    </div>

    <div class="icon-success">✓</div>

    <h1>Registration Complete</h1>
    
    <p>Thank you for choosing <span class="highlight">Prana Yoga</span></p>
    
    <div class="status">
      <span>Redirecting you to WhatsApp</span>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    setTimeout(function() {
      window.location.href = "https://wa.me/919028329148?text=Hi%20I%20have%20completed%20my%20registration%20for%20Prana%20Yoga";
    }, 3000);
  </script>
</body>
</html>
